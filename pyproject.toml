[tool.black]
line-length = 100
target-version = ['py39', 'py310', 'py311']
include = '\.pyi?$'
extend-exclude = '''
/(
  # directories
  \.eggs
  | \.git
  | \.venv
  | venv
  | build
  | dist
)/
'''

[tool.isort]
profile = "black"
line_length = 100
skip_gitignore = true

[tool.mypy]
python_version = "3.9"
warn_return_any = true
warn_unused_configs = true
disallow_untyped_defs = false
ignore_missing_imports = true
exclude = [
    'venv',
    '.venv',
    'build',
    'dist',
]

[tool.pytest.ini_options]
markers = [
    "aggregate: aggregation pipeline tests",
    "collection_mgmt: collection management tests",
    "find: find operation tests",
    "insert: insert operation tests",
    "slowtest: tests that are slow to run",
    "smoke: smoke tests",
    "structures: structure validation tests",
    "unit: fast unit tests with no external dependencies",
]
